<!DOCTYPE html>
<html lang="zh-TW" data-theme="ink-wash">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多條碼掃描器 MVP</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    if (navigator.mediaDevices === undefined) navigator.mediaDevices = {};
    if (navigator.mediaDevices.getUserMedia === undefined) {
      navigator.mediaDevices.getUserMedia = function(c) {
        var g = navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
        if (!g) return Promise.reject(new Error('此瀏覽器不支援相機功能'));
        return new Promise(function(r, e) { g.call(navigator, c, r, e); });
      };
    }
  </script>
  <script src="https://unpkg.com/@zxing/browser@0.1.5"></script>
  <script>window.ZXing = window.ZXingBrowser || window.ZXing;</script>
</head>
<body>
  <div class="container">
    <header>
      <h1>多條碼掃描器</h1>
      <p class="subtitle">支援 1D/2D 條碼 | 多尺度掃描 | 即時過濾</p>
    </header>

    <nav class="tab-bar">
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="scanner">掃描器</button>
        <button class="tab-btn" data-tab="test">測試條碼</button>
      </div>
      <button class="theme-toggle" id="themeToggle" title="切換主題">
        <span id="themeIcon">水墨</span>
      </button>
    </nav>

    <!-- ========== Tab: 掃描器 ========== -->
    <div class="tab-pane active" data-tab-pane="scanner">

      <div class="control-panel">
        <div class="control-group">
          <label>掃描模式：</label>
          <select id="scanMode">
            <option value="pyramid">金字塔掃描（推薦）</option>
            <option value="single">單次全圖掃描</option>
            <option value="roi">ROI 區域定位</option>
          </select>
        </div>
        <div class="control-group">
          <label>最小信心度：</label>
          <input type="range" id="minConfidence" min="1" max="10" value="3">
          <span id="confidenceValue">3</span>
        </div>
        <div class="control-group">
          <label>條碼類型：</label>
          <div class="checkbox-group">
            <label><input type="checkbox" value="ean_13" checked> EAN-13</label>
            <label><input type="checkbox" value="ean_8" checked> EAN-8</label>
            <label><input type="checkbox" value="code_128" checked> Code-128</label>
            <label><input type="checkbox" value="code_39" checked> Code-39</label>
            <label><input type="checkbox" value="qr_code" checked> QR Code</label>
            <label><input type="checkbox" value="data_matrix" checked> Data Matrix</label>
            <label><input type="checkbox" value="pdf_417" checked> PDF-417</label>
            <label><input type="checkbox" value="itf" checked> ITF</label>
          </div>
        </div>
        <div class="control-group">
          <label>金字塔尺度：</label>
          <input type="text" id="pyramidScales" value="1.0,0.6,0.35" placeholder="1.0,0.6,0.35">
        </div>
      </div>

      <!-- 相機 -->
      <div class="video-container">
        <div class="video-wrapper">
          <video id="video" autoplay playsinline></video>
          <canvas id="overlay"></canvas>
          <div class="scan-indicator" id="scanIndicator">
            <span class="spinner"></span> 掃描中...
          </div>
        </div>
        <div class="button-group">
          <button id="startBtn" class="btn primary">開啟相機</button>
          <button id="stopBtn" class="btn danger" disabled>停止掃描</button>
          <button id="clearBtn" class="btn secondary">清除結果</button>
          <button id="uploadBtn" class="btn secondary">上傳圖片</button>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <!-- 即時辨識（固定高度，避免閃爍） -->
      <div class="live-detect-section">
        <div class="live-detect-header">
          <span class="live-detect-title">即時辨識</span>
          <span class="live-detect-count" id="liveCount">0 個</span>
        </div>
        <div class="live-detect-box" id="liveDetectBox">
          <span class="live-detect-empty">等待掃描...</span>
        </div>
      </div>

      <!-- 統計 -->
      <div class="stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="fpsValue">0</span>
            <span class="stat-label">FPS</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="frameCount">0</span>
            <span class="stat-label">已處理幀數</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="uniqueBarcodes">0</span>
            <span class="stat-label">唯一條碼</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="avgConfidence">0</span>
            <span class="stat-label">平均信心度</span>
          </div>
        </div>
      </div>

      <!-- 累計掃描結果（去重明文列表） -->
      <div class="accumulated-section">
        <div class="accumulated-header">
          <h2>累計掃描結果 <span id="accumulatedCount">0</span> 個</h2>
          <div class="accumulated-actions">
            <button id="copyAccumulatedBtn" class="btn small primary">複製列表</button>
            <button id="clearAccumulatedBtn" class="btn small secondary">清除</button>
          </div>
        </div>
        <div class="accumulated-list" id="accumulatedList">
          <span class="empty-hint">尚無累計結果</span>
        </div>
      </div>

      <!-- 過濾設定 -->
      <div class="filter-section">
        <h2>過濾設定</h2>
        <div class="filter-group">
          <label>格式驗證：</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="validateEAN" checked> EAN 檢查碼驗證</label>
            <label><input type="checkbox" id="validateCode128" checked> Code-128 最小長度</label>
            <label><input type="checkbox" id="filterDuplicates" checked> 過濾重複</label>
          </div>
        </div>
        <div class="filter-group">
          <label>內容過濾（正則表達式）：</label>
          <input type="text" id="contentFilter" placeholder="例: ^[0-9]{13}$ (EAN-13 格式)">
          <button id="addFilterBtn" class="btn small">新增過濾</button>
        </div>
        <div id="activeFilters" class="active-filters"></div>
      </div>
    </div>

    <!-- ========== Tab: 測試條碼 ========== -->
    <div class="tab-pane" data-tab-pane="test">

      <!-- 條碼產生器 -->
      <div class="test-section">
        <h2>測試用條碼</h2>
        <p>點擊條碼可複製值，用於測試掃描功能</p>
        <div class="test-controls">
          <button id="generateTestBtn" class="btn secondary">重新產生</button>
          <button id="printTestBtn" class="btn secondary">列印測試頁</button>
        </div>
        <div id="testBarcodes" class="test-barcodes-grid"></div>
      </div>

      <!-- 條碼明文列表 -->
      <div class="barcode-plaintext-section">
        <div class="barcode-plaintext-header">
          <h2>條碼明文列表</h2>
          <button id="copyPlaintextBtn" class="btn small primary">複製</button>
        </div>
        <div class="barcode-plaintext-box" id="barcodePlaintextBox">
          <span class="empty-hint">尚未產生條碼</span>
        </div>
      </div>

      <!-- 比對工具 -->
      <div class="comparison-section">
        <h2>辨識率比對</h2>
        <p class="hint">將掃描器頁「累計掃描結果」複製後貼入下方，與上方條碼明文列表進行比對</p>
        <div class="comparison-input-area">
          <h3>掃描結果（貼入）</h3>
          <textarea id="scannedInput" rows="6" placeholder="從掃描器頁複製累計結果後貼入此處&#10;每行一個條碼"></textarea>
        </div>
        <div class="comparison-actions">
          <button id="compareBtn" class="btn primary">開始比對</button>
          <button id="clearCompareBtn" class="btn secondary">清除比對結果</button>
        </div>
        <div id="comparisonResults" class="comparison-results"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>條碼掃描器 MVP v1.0 | ZXing-js</p>
  </footer>

  <script src="js/barcode-scanner.js"></script>
  <script src="js/test-barcode-generator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
